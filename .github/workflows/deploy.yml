name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan (PR check)
        if: github.event_name == 'pull_request'
        working-directory: infra
        run: terraform plan -var-file=envs/dev.tfvars

      - name: Terraform Apply ECR first
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: infra
        run: |
          terraform workspace select prod || terraform workspace new prod
          terraform apply -auto-approve -var-file=envs/prod.tfvars -target=module.ecr

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p build
          uv export --no-dev --format requirements-txt > build/requirements.txt
          ECR_URL=$(terraform -chdir=infra output -raw ecr_repository_url)
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_URL
          docker build -t $ECR_URL:latest .
          docker push $ECR_URL:latest

      - name: Terraform Apply remaining
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: infra
        run: terraform apply -auto-approve -var-file=envs/prod.tfvars