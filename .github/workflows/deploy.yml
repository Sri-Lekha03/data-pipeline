name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build Lambda zip
        run: |
          mkdir -p build
          uv export --no-dev --format requirements-txt > build/requirements.txt
          pip install -r build/requirements.txt -t build/package/
          cp -r pipeline build/package/
          cd build/package && zip -r ../../lambda.zip .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan (PR check)
        if: github.event_name == 'pull_request'
        working-directory: infra
        run: terraform plan -var-file=envs/dev.tfvars

      - name: Terraform Apply S3 first
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: infra
        run: |
          terraform workspace select prod || terraform workspace new prod
          terraform apply -auto-approve -var-file=envs/prod.tfvars -target=module.s3

      - name: Upload Lambda zip to S3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          SOURCE_BUCKET=$(terraform -chdir=infra output -raw source_bucket_name)
          aws s3 cp lambda.zip s3://$SOURCE_BUCKET/lambda/lambda.zip

      - name: Terraform Apply remaining
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: infra
        run: terraform apply -auto-approve -var-file=envs/prod.tfvars